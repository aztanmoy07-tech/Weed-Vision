<!DOCTYPE html>
<html>
<head>
    <title>Login - WeedVision</title>

    <style>
        body {
            margin: 0;
            background: #0b1120;

            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1e293b;

<body>

<div class="login-box">
    <h1>🌿 WeedVision</h1>
    <p>Login to continue</p>

    <a href="/login">
        <button>Login with Google</button>
    </a>
</div>

</body>
</html>
